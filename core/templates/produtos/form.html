{% extends "base.html" %}

{% block title %}Formulario Produto{% endblock  %}

{% block content %}


<h1>
    {% if object %}
    Editar Produto
    {% else %}
    Criar Produto
    {% endif %}
</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Salvar</button>
</form>

<a href="{% url 'lista_produtos' %}">Voltar</a>
{% endblock content %}
